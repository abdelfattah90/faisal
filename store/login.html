    <header class="header">

    <div class="page">
      <div class="section form-box">
        <div class="tabs">
          <a href="#" class="active">تسجيل الدخول</a>
          <a href="#">إنشاء حساب</a>
        </div>

        <!-- Login Form -->
        <div class="form-group">
          <label>رقم الجوال / البريد الإلكتروني</label>
          <input type="text" placeholder="05xxxxxxxx" />
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" placeholder="••••••••" />
        </div>
        <a
          href="#"

          <input type="text" placeholder="مثال: سارة أحمد" />

        <div class="form-group">
          <label>رقم الجوال</label>
          <input type="text" placeholder="05xxxxxxxx" />
        </div>

          <label>البريد الإلكتروني</label>
          <input type="email" placeholder="example@email.com" />
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" placeholder="••••••••" />
        </div>
        <a
          href="#"
          class="btn btn-primary"
          style="width: 100%; text-align: center"
          >إنشاء الحساب</a

      <div class="footer">مربط الفيصل اف اند ان © 2026</div>
